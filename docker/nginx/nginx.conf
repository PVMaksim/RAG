events {
    worker_connections 1024;
}

http {
    # ── Rate limiting зоны ─────────────────────────────────────────────────
    # search: 20 req/min на IP (SSE стриминг дорогой)
    limit_req_zone $binary_remote_addr zone=search:10m rate=20r/m;
    # api: 60 req/min на IP (общий лимит для остальных API)
    limit_req_zone $binary_remote_addr zone=api:10m    rate=60r/m;
    # upload: 5 req/min на IP (ZIP архивы тяжёлые)
    limit_req_zone $binary_remote_addr zone=upload:10m rate=5r/m;

    # Возвращаем 429 вместо 503 при превышении лимита
    limit_req_status 429;

    # ── Апстримы ────────────────────────────────────────────────────────────
    upstream frontend {
        server frontend:3000;
    }

    upstream backend {
        server backend:8000;
    }

    # ── Основной сервер ──────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Отключить буферизацию для SSE стриминга
        proxy_buffering off;
        proxy_cache off;

        # ── API → backend ──────────────────────────────────────────────────
        # /api/search/* — жёсткий лимит (SSE стриминг)
        location ~* ^/api/(search|upload)/ {
            limit_req zone=search burst=5 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection '';
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_buffering off;
            chunked_transfer_encoding on;
        }

        # /api/* — общий лимит
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection '';
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_buffering off;
            chunked_transfer_encoding on;
        }

        # Health check → backend
        location /health {
            proxy_pass http://backend/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ── Frontend → Next.js ─────────────────────────────────────────────
        location / {
            proxy_pass http://frontend/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
