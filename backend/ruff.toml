# ruff.toml — конфигурация Python линтера
# Документация: https://docs.astral.sh/ruff/

# Проверяем только backend/src/ и tests/
[lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort (порядок импортов)
    "B",   # flake8-bugbear (частые ошибки)
    "UP",  # pyupgrade (современный синтаксис Python)
    "N",   # pep8-naming
    "SIM", # flake8-simplify
    "TCH", # flake8-type-checking
    "RUF", # ruff-specific rules
]

ignore = [
    "E501",   # line too long (обрабатываем через formatter)
    "B008",   # do not perform function calls in default arguments (FastAPI Depends)
    "UP007",  # use X | Y for union types (не все версии поддерживают)
    "SIM117", # use single with statement (читаемость важнее)
    "N806",   # variable in function should be lowercase (SQLAlchemy паттерны)
]

# Исключаем сгенерированный код и виртуальное окружение
exclude = [
    ".venv",
    "venv",
    "__pycache__",
    "*.pyc",
    "migrations",
]

# Разрешаем авто-фикс для безопасных правил
fixable = ["I", "UP", "F401", "RUF100"]

[format]
# Используем двойные кавычки (как в большинстве Python кода)
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[lint.isort]
# Группировка импортов: stdlib → third-party → local
known-first-party = ["config", "dependencies", "exceptions", "logging_config"]
