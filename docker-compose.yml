version: '3.9'

# ── Production / VPS ──────────────────────────────────────────────────────────
# Для локальной разработки:
#   docker-compose -f docker-compose.yml -f docker-compose.dev.yml up --build

services:

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "3000:3000"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.5"
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  frontend:
    build:
      context: .
      dockerfile: ./docker/frontend/Dockerfile
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  backend:
    build:
      context: .
      dockerfile: ./docker/backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      - chroma_data:/app/data/chroma_db
      - graph_data:/app/data
      - projects_data:/app/projects
    deploy:
      resources:
        limits:
          # sentence-transformers модель ~400MB + ChromaDB + Python overhead
          memory: 1500m
          cpus: "2.0"
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  mcp-server:
    build:
      context: .
      dockerfile: ./docker/mcp/Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - "27183:27183"
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    logging:
      driver: "json-file"
      options: { max-size: "5m", max-file: "3" }
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:27183/mcp/sse')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  chroma_data:
  graph_data:
  projects_data:
  certbot_data:
  certbot_www:
