name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Run Tests
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml up --abort-on-container-exit backend
        env:
          AI_API_KEY: test-key